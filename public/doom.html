<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DOOM — tunaFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; height: 100vh; }
    #dos { width: 100vw; height: 100vh; }
    .loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #ef4444; font-family: monospace;
    }
    .loading .skull { font-size: 60px; margin-bottom: 16px; }
    .loading .text { font-size: 14px; animation: pulse 1.5s infinite; }
    .loading .sub { font-size: 10px; color: #ef444460; margin-top: 8px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
  <link rel="stylesheet" href="/emulators/js-dos.css">
</head>
<body>
  <div id="dos">
    <div class="loading" id="loader">
      <div class="skull">💀</div>
      <div class="text">Loading DOOM...</div>
      <div class="sub">js-dos + DOSBox WASM</div>
    </div>
  </div>
  <script src="/emulators/js-dos.js"></script>
  <script>
    window.addEventListener("load", function() {
      if (typeof Dos === "undefined") {
        document.getElementById("loader").innerHTML =
          '<div class="skull">⚠️</div><div class="text">Dos not loaded</div>';
        return;
      }
      Dos(document.getElementById("dos"), {
        url: "https://cdn.dos.zone/original/2X/2/24b00b14f118580763440ecaddcc948f134f4e40.jsdos",
        pathPrefix: "/emulators/",
      });
    });
  </script>
</body>
</html>
